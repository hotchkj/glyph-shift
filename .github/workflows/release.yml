# Not triggered on pull_request. Every release waits for ci.yml success on the commit being released.
# Branch push: wait for CI → conventional tag bump → goreleaser when new_tag is set.
# Tag push / workflow_dispatch: wait for CI on that tag's commit → goreleaser for that tag.
name: Release

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0). Required when run manually.'
        required: true

permissions:
  contents: write
  actions: read

env:
  GOPRIVATE: github.com/hotchkj/*

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || (github.event_name == 'push' && github.ref_type == 'tag' && github.ref_name) || github.ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: configure private module access
        run: gh auth setup-git
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve commit for CI gate
        id: commit
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Wait for CI to pass
        uses: ArcticLampyrid/action-wait-for-workflow@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: ci.yml
          sha: ${{ steps.commit.outputs.sha }}
          wait-interval: 15
          allowed-conclusions: |
            success

      - name: Bump version and tag
        if: github.event_name == 'push' && github.ref_type != 'tag'
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: false
          tag_prefix: v
          fetch_all_tags: true

      - name: Fail when no git tags exist on main
        if: github.event_name == 'push' && github.ref_type != 'tag' && steps.tag.outputs.new_tag == '' && steps.tag.outputs.previous_tag == 'v0.0.0'
        run: |
          echo "::error::No v* tags on the repository. github-tag-action cannot analyze commits (synthetic v0.0.0@HEAD). Push an initial tag on main, e.g. git push origin v0.1.0"
          exit 1

      - name: Fetch new tag
        if: github.event_name == 'push' && github.ref_type != 'tag' && steps.tag.outputs.new_tag != ''
        run: git fetch origin tag ${{ steps.tag.outputs.new_tag }}

      - name: Resolve release tag
        id: release-env
        run: |
          release_tag="${{ github.event_name == 'workflow_dispatch' && inputs.tag || steps.tag.outputs.new_tag || (github.ref_type == 'tag' && github.ref_name) || '' }}"
          if [ -z "$release_tag" ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        if: steps.release-env.outputs.should_release == 'true'
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.mod
            go.sum

      - name: Run GoReleaser
        if: steps.release-env.outputs.should_release == 'true'
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.release-env.outputs.release_tag }}

      - name: Upload release assets
        if: steps.release-env.outputs.should_release == 'true'
        run: |
          gh release upload "$RELEASE_TAG" dist/glyph-shift_*.tar.gz dist/glyph-shift_*.zip dist/checksums.txt --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release-env.outputs.release_tag }}
